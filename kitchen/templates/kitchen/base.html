{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SmartKitchen — track ingredients, discover recipes, reduce food waste.">
    <title>{% block title %}SmartKitchen{% endblock %}</title>

    <!-- Bootstrap 5: responsive CSS framework (requirement: responsive layout) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Project-specific styles kept in a separate file (separation of concerns) -->
    <link rel="stylesheet" href="{% static 'kitchen/css/style.css' %}?v=20260317">
</head>
<body>
    <!-- WCAG 2.4.1: skip-to-content link for keyboard / screen-reader users -->
    <a href="#main-content" class="skip-link visually-hidden-focusable">
        Skip to main content
    </a>

    <!-- Shared navigation bar — extracted as a reusable partial (avoid duplication) -->
    {% include 'kitchen/partials/navbar.html' %}

    <!-- Main content area: receives focus via skip-link above -->
    <main id="main-content" class="py-4" role="main">
        <div class="container">
            <!-- Django messages framework — reusable partial for flash notifications -->
            {% include 'kitchen/partials/messages.html' %}
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Shared footer — extracted as a reusable partial -->
    {% include 'kitchen/partials/footer.html' %}

    <!-- Bootstrap JS bundle (Popper included for dropdowns / tooltips) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application JS kept in a separate file (separation of concerns) -->
    <script src="{% static 'kitchen/js/app.js' %}?v=20260317"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
