{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartKitchen{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'kitchen/css/style.css' %}?v=20260311b">
</head>
<body>
    {% include 'kitchen/partials/navbar.html' %}

    <main class="py-4">
        <div class="container">
            {% include 'kitchen/partials/messages.html' %}
            {% block content %}{% endblock %}
        </div>
    </main>

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="{% static 'kitchen/js/app.js' %}?v=20260311a"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
