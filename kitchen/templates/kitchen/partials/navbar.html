<!-- Navigation bar: sticky header for easy access across all pages -->
<!-- Uses Bootstrap navbar-expand-lg for responsive collapse on mobile -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm" aria-label="Main navigation">
    <div class="container">

        <!-- Brand / logo link — always visible -->
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            <i class="bi bi-basket2-fill me-2" aria-hidden="true"></i>SmartKitchen
        </a>

        <!-- Mobile toggle button (WCAG 2.1.1: keyboard-operable via Bootstrap JS) -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
                aria-controls="mainNavbar"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible link group -->
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a class="nav-link{% if request.resolver_match.url_name == 'home' %} active{% endif %}"
                       href="{% url 'home' %}"
                       {% if request.resolver_match.url_name == 'home' %}aria-current="page"{% endif %}>
                        Home
                    </a>
                </li>

                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link{% if request.resolver_match.url_name == 'dashboard' %} active{% endif %}"
                           href="{% url 'dashboard' %}"
                           {% if request.resolver_match.url_name == 'dashboard' %}aria-current="page"{% endif %}>
                            Inventory
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.resolver_match.url_name == 'recipe_list' %} active{% endif %}"
                           href="{% url 'recipe_list' %}"
                           {% if request.resolver_match.url_name == 'recipe_list' %}aria-current="page"{% endif %}>
                            Recipes
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <!-- Logout uses POST via a form (CSRF-safe) -->
                        <form method="post" action="{% url 'logout' %}" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="nav-link btn btn-link nav-logout-btn">
                                <i class="bi bi-box-arrow-right me-1" aria-hidden="true"></i>Logout
                            </button>
                        </form>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link{% if request.resolver_match.url_name == 'recipe_list' %} active{% endif %}"
                           href="{% url 'recipe_list' %}">
                            Recipes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.resolver_match.url_name == 'login' %} active{% endif %}"
                           href="{% url 'login' %}">
                            Login
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm ms-lg-2"
                           href="{% url 'register' %}">
                            Sign Up
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
